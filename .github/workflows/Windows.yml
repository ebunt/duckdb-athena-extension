name: Windows
on: [push, pull_request]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash

jobs:
  windows:
    name: Windows Release
    runs-on: windows-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build extension
        run: |
          cargo build --release
          cp target/release/duckdb_athena.dll athena.duckdb_extension

      - uses: actions/upload-artifact@v4
        with:
          name: windows_amd64-extensions
          path: athena.duckdb_extension

      - name: Configure AWS credentials
        if: ${{ env.OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.S3_REGION }}
        env:
          OIDC_ROLE_ARN: ${{ secrets.OIDC_ROLE_ARN }}

      - name: Deploy
        if: ${{ env.BUCKET_NAME != '' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') }}
        env:
          BUCKET_NAME: ${{ secrets.S3_BUCKET }}
        run: |
          EXTENSION_VERSION=${{ github.ref_name }}
          if [[ "$GITHUB_REF" =~ ^(refs/heads/main)$ ]]; then
            EXTENSION_VERSION=$(git log -1 --format=%h)
          fi
          aws s3 cp athena.duckdb_extension \
            s3://${BUCKET_NAME}/duckdb-athena/${EXTENSION_VERSION}/windows_amd64/athena.duckdb_extension

