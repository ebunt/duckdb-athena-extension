name: Linux
on: [push, pull_request]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash

jobs:
  linux:
    name: Linux Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
        include:
          - target: x86_64-unknown-linux-gnu
            arch: linux_amd64
          - target: aarch64-unknown-linux-gnu
            arch: linux_arm64

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools (arm64)
      if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
      run: |
        sudo apt-get update -y -qq
        sudo apt-get install -y -qq gcc-aarch64-linux-gnu

    - name: Build extension
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      run: |
        cargo build --release --target ${{ matrix.target }}
        cp target/${{ matrix.target }}/release/libduckdb_athena.so athena.duckdb_extension

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.arch }}-extensions
        path: athena.duckdb_extension

    - name: Configure AWS credentials
      if: ${{ env.OIDC_ROLE_ARN != '' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
        aws-region: ${{ secrets.S3_REGION }}
      env:
        OIDC_ROLE_ARN: ${{ secrets.OIDC_ROLE_ARN }}

    - name: Deploy
      if: ${{ env.BUCKET_NAME != '' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') }}
      env:
        BUCKET_NAME: ${{ secrets.S3_BUCKET }}
      run: |
        EXTENSION_VERSION=${{ github.ref_name }}
        if [[ "$GITHUB_REF" =~ ^(refs/heads/main)$ ]]; then
          EXTENSION_VERSION=$(git log -1 --format=%h)
        fi
        aws s3 cp athena.duckdb_extension \
          s3://${BUCKET_NAME}/duckdb-athena/${EXTENSION_VERSION}/${{ matrix.arch }}/athena.duckdb_extension

